trigger:
- master

pool:
  name: my-linux-agent

steps:

- script: |
    terraform version
  displayName: Check Terraform

- script: |
    cd terraform
    terraform init
  displayName: Terraform Init

- script: |
    cd terraform
    terraform validate
  displayName: Terraform Validate

- script: |
    cd terraform
    terraform plan
  displayName: Terraform Plan